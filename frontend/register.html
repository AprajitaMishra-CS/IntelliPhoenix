<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/register.css">
    <link rel="icon" href="assests/logo.png">
    <title>Register | IntelliPhoenix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navTop">
        <div class="navLeft">
            <img src="assests/logo.png">
        </div>
        <div class="menuIcon" id="menuIcon">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <ul class="navRight">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="services.html">Services</a>
            <a href="contact.html">Contact</a>
            <a href="login.html">Login</a>
            <a href="register.html">Register</a>
        </ul>
    </nav>

    <div class="overlay" id="overlay"></div>

    <div class="gapping"></div>
    
    <main class="mainContent">
        <section class="formCon">
            <h2>&ast;CREATE YOUR ACCOUNT&ast;</h2>
            <h4>Start your smart healthcare journey today</h4>

            <div class="gapping"></div>
    
            <form action="" class="form">
                <h3>REGISTRATION FORM</h3>
                <div class="formInner">
                    <label for="name">
                        <i class="fa-regular fa-user"></i> Name:
                        <input type="text" placeholder="Enter your name" class="input" id="name" name="name" required>
                    </label>
                    <br><br>
                    <label for="email">
                        <i class="fa-regular fa-envelope"></i> Email:
                        <input type="email" placeholder="Enter your email address" class="input" id="email" name="email" required>
                    </label>
                    <br><br>
                    <label for="number">
                        <i class="fa-solid fa-phone"></i> Phone No:
                        <input type="text" placeholder="Enter your phone number" class="input" id="number" name="number" required>
                    </label>
                    <br><br>
                    <label for="dob">
                        <i class="fa-solid fa-calendar"></i> Date of Birth:
                        <input type="date" class="input" id="dob" name="dob" required>
                    </label>
                    <br><br>
                    <label for="gender">
                        <i class="fa-solid fa-user"></i> Gender:
                        <select class="input" id="gender" name="gender" required>
                            <option value="">Select your gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </label>
                    <br><br>
                    <label for="role">
                        <i class="fa-solid fa-user-tag"></i> Role:
                        <select class="input" id="role" name="role" required>
                            <option value="">Select your role</option>
                            <option value="patient" selected>Patient</option>
                            <option value="doctor">Doctor</option>
                            <option value="admin">Admin</option>
                        </select>
                    </label>
                    <br><br>
                    <label for="pswd">
                        <i class="fa-solid fa-lock"></i> Password:
                        <input type="password" placeholder="Enter password" class="input" id="pswd" name="pswd" required>
                        <button class="pswd" type="button" onclick="togglePassword()"><i class="fa-solid fa-eye"></i></button>
                    </label>
                    <p id="strength"></p>
                    <label for="cpswd">
                        <i class="fa-solid fa-lock"></i> Confirm Password:
                        <input type="password" placeholder="Enter password" class="input" id="cpswd" name="cpswd" required>
                    </label>
                    <p id="match"></p>
                    <br><br>
                    <input type="checkbox" name="terms" id="terms" checked required/>
                    <label for="terms">I agree to the terms & conditions and Privacy Policy.</label>
                    <br>
                    <div class="btns">
                        <button type="submit" class="btn">Create Account &rightarrow;</button>
                    </div>
                    <p class="successMsg" id="successMsg"></p>
                    <div class="divider">
                        <div class="hrTag"><hr></div>
                        <span>OR</span>
                        <div class="hrTag"><hr></div>
                    </div>
                    <div class="optionals">
                        <button class="option"><i class="fa-brands fa-google"></i> Continue with Google</button>
                        <h4>Already have an account? <a href="login.html">Login</a></h4>
                    </div>
                </div>
            </form>
        </section>
    </main>

    <div class="gapping"></div>

    <script src="js/register.js"></script>
</body>
</html>
